        subs: [

      {
        nome: "Chás Gelados", desc: "Tradicionais e naturais",
        img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=96&h=96&fit=crop",
        tag: "Sem álcool", tagBg: "#E1F5EE", tagColor: "#085041",
        subs: [
          { nome: "Chá preto com limão", img: "https://images.unsplash.com/photo-1564890369478-c89ca6d9cde9?w=72&h=72&fit=crop" },

        ]
      },
      {
        nome: "Cafés Gelados", desc: "Refrescantes e energizantes",
        img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=96&h=96&fit=crop",
        tag: "Sem álcool", tagBg: "#E1F5EE", tagColor: "#085041",
        subs: [
          { nome: "Cold brew", img: "https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=72&h=72&fit=crop" },
          { nome: "Frappuccino", img: "https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=72&h=72&fit=crop" },
          { nome: "Café com leite gelado", img: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=72&h=72&fit=crop" },
          { nome: "Espresso tônica", img: "https://images.unsplash.com/photo-1509785307050-d4066910ec1e?w=72&h=72&fit=crop" },
        ]
      },
    ];

    const lista = document.getElementById('lista');

    dados.forEach(cat => {
      const div = document.createElement('div');
      div.className = 'categoria';

      const header = document.createElement('div');
      header.className = 'cat-header';

      const img = document.createElement('img');
      img.className = 'cat-img';
      img.src = cat.img;
      img.alt = cat.nome;

      const info = document.createElement('div');
      info.className = 'cat-info';
      info.innerHTML = `<div class="cat-nome">${cat.nome}</div><div class="cat-desc">${cat.desc}</div>`;

      const tag = document.createElement('span');
      tag.className = 'cat-tag';
      tag.textContent = cat.tag;
      tag.style.background = cat.tagBg;
      tag.style.color = cat.tagColor;

      const chev = document.createElement('span');
      chev.className = 'chevron';
      chev.innerHTML = '&#8964;';

      header.append(img, info, tag, chev);

      const subs = document.createElement('div');
      subs.className = 'subitens';

      cat.subs.forEach(sub => {
        const subDiv = document.createElement('div');
        subDiv.className = 'subitem';
        const sImg = document.createElement('img');
        sImg.className = 'sub-img';
        sImg.src = sub.img;
        sImg.alt = sub.nome;
        const sNome = document.createElement('span');
        sNome.className = 'sub-nome';
        sNome.textContent = sub.nome;
        subDiv.append(sImg, sNome);
        subs.appendChild(subDiv);
      });

      header.addEventListener('click', () => {
        const aberto = subs.classList.toggle('aberto');
        chev.classList.toggle('aberto', aberto);
      });

      div.append(header, subs);
      lista.appendChild(div);
    });
  </script>
</body>
</html>
